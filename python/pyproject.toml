[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "superbrain-sdk"
version = "0.1.0"
authors = [
  { name="Anispy", email="anispy211@gmail.com" },
]
description = "Premium Python SDK for Superbrain Distributed Memory Fabric"
readme = "README.md"
requires-python = ">=3.8"
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
keywords = ["distributed", "memory", "ai", "agents", "grpc"]
dependencies = []

[project.urls]
"Homepage" = "https://github.com/anispy211/superbrainSdk"
"Bug Tracker" = "https://github.com/anispy211/superbrainSdk/issues"

[tool.setuptools]
packages = ["superbrain"]
